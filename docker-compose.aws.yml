version: '3.8'

services:
  # Combined Flask + Streamlit App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-devops-app
    restart: unless-stopped
    ports:
      - "5000:5000"    # Flask backend
      - "8501:8501"    # Streamlit frontend
    environment:
      - ENVIRONMENT=production
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_USER=${JENKINS_USER:-admin}
      - JENKINS_TOKEN=${JENKINS_TOKEN:-}
    networks:
      - devops-network
    depends_on:
      - jenkins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jenkins CI/CD Server
  jenkins:
    build:
      context: .
      dockerfile: jenkins.Dockerfile
    container_name: jenkins
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Dhudson.security.csrf.GlobalCrumbIssuerConfiguration.DISABLE_CSRF_PROTECTION=true -Xmx2g -Xms1g
    networks:
      - devops-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  jenkins_home:
    driver: local

networks:
  devops-network:
    driver: bridge
